{% extends "base.html" %}

{% block title %}Verify OTP - {{ shop_name }}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0"><i class="fas fa-shield-alt"></i> Security Verification</h4>
            </div>
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="fas fa-envelope-open-text fa-3x text-primary mb-3"></i>
                    <p class="text-muted">We have sent a 6-digit One-Time Password (OTP) to your registered email address.</p>
                </div>

                <form method="POST" action="{{ url_for('verify_otp_page') }}">
                    <div class="mb-4">
                        <label for="otp" class="form-label fw-bold">Enter OTP Code</label>
                        <input type="text" class="form-control form-control-lg text-center letter-spacing-2" 
                               id="otp" name="otp" 
                               placeholder="123456" 
                               maxlength="6" 
                               required autofocus autocomplete="off"
                               style="letter-spacing: 5px; font-size: 1.5rem;">
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            Verify & Login
                        </button>
                    </div>
                </form>
                
                <div class="text-center mt-3">
                    <a href="{{ url_for('admin_login') }}" class="text-decoration-none small text-muted">
                        <i class="fas fa-arrow-left"></i> Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
